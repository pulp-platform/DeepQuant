name: CI

on: 
  push:
  pull_request:
  workflow_dispatch:

jobs:

  build-deepquant:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: "3.11"
      - name: Build DeepQuant
        run: |
          python -m pip install --upgrade pip
          pip install -e .
